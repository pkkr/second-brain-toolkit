name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --editable .
      - run: python -m unittest discover -s tests
      - run: python second_brain.py check . --strict --skip-generated --skip-config
      - run: python second_brain.py check examples/second-brain --strict
      - run: python second_brain.py generate examples/second-brain --check
      - run: python -m pip wheel --no-deps --wheel-dir dist .
      - run: bash -n install.sh second-brain
      - run: ./install.sh --dry-run
      - run: bash tests/test_install.sh
